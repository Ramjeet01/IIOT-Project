<!DOCTYPE html>
<html>
<head>
    <title>Search</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-light">
    <a class="navbar-brand mx-auto">Recommendation</a>
    <a href="/">Home</a>
</nav>

<div class="container mt-4">

<form action="/recommendations" method="post">
    <input type="text" name="prod" placeholder="Product name" class="form-control">
    <input type="number" name="nbr" placeholder="Number" class="form-control mt-2">
    <button class="btn btn-primary mt-2">Search</button>
</form>

{% if message %}
<p class="text-danger mt-2">{{ message }}</p>
{% endif %}

{% if content_based_rec is defined and not content_based_rec.empty %}

<div class="row mt-4">
{% for index, product in content_based_rec.iterrows() %}
<div class="col-md-3">
    <div class="card">
        <img src="{{ product['ImageURL'] }}" height="200">
        <div class="card-body">
            <h5>{{ truncate(product['Name'],12) }}</h5>
            <p>{{ product['Brand'] }}</p>
            <p>₹ {{ random_price }}</p>
        </div>
    </div>
</div>
{% endfor %}
</div>

{% endif %}

</div>

</body>
</html>
